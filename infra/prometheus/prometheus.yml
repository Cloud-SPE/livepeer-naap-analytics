global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: naap-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
