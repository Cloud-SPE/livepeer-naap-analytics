apiVersion: 1

policies:
  - orgId: 1
    receiver: naap-default-warning
    group_by:
      - alertname
      - severity
      - component
      - surface
      - pipeline_type
      - job_type
      - pipeline_id
      - gateway
      - orchestrator_uri
      - datasource
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: naap-critical-fanout
        object_matchers:
          - ['severity', '=~', 'critical|page-now']
        group_wait: 15s
        group_interval: 2m
        repeat_interval: 30m
