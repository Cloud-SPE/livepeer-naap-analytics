services:
  # ── Kafka (KRaft mode) ───────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
    environment:
      # KRaft — single node acts as both broker and controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners — PLAINTEXT only for local dev (no SASL)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "29092"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      warehouse-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      ENV: development
      LOG_LEVEL: debug
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_reader
      CLICKHOUSE_PASSWORD: naap_reader_changeme
      CLICKHOUSE_WRITER_USER: naap_writer
      CLICKHOUSE_WRITER_PASSWORD: naap_writer_changeme
      ENRICHMENT_ENABLED: "true"
      ENRICHMENT_INTERVAL: 5m
      LIVEPEER_API_URL: https://livepeer-api.livepeer.cloud
    volumes:
      - ./api:/app/api
    restart: on-failure

  warehouse-init:
    build:
      context: .
      dockerfile: infra/docker/dbt.Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      DBT_PROFILES_DIR: /app/warehouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD:-changeme}
      DBT_AUTO_RUN_ON_START: "false"
    volumes:
      - ./warehouse:/app/warehouse
    working_dir: /app/warehouse
    command: ["run"]
    restart: "no"

  resolver:
    build:
      context: .
      dockerfile: infra/docker/resolver.Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      ENV: development
      LOG_LEVEL: debug
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: naap
      CLICKHOUSE_WRITER_USER: naap_writer
      CLICKHOUSE_WRITER_PASSWORD: naap_writer_changeme
      RESOLVER_ENABLED: "true"
      # auto = single-service production mode:
      #   keep tail current first,
      #   repair the latest eligible same-day dirty hour next,
      #   execute queued bounded repair requests after that,
      #   then drain historical dirty partitions and any remaining bootstrap backlog
      # bootstrap = bounded backlog catch-up only, then enter tail automatically
      # tail = steady-state tail only
      RESOLVER_MODE: ${RESOLVER_MODE:-auto}
      RESOLVER_INTERVAL: 1m
      RESOLVER_LATENESS_WINDOW: 10m
      RESOLVER_DIRTY_QUIET_PERIOD: 2m
      RESOLVER_CLAIM_TTL: 2m
      RESOLVER_VERSION: selection-centered-v1
      RESOLVER_BATCH_SIZE: "500"
      RESOLVER_PORT: "9102"
      RESOLVER_ADMIN_TOKEN: ${RESOLVER_ADMIN_TOKEN:-}
    restart: unless-stopped

  warehouse:
    profiles: ["tooling"]
    build:
      context: .
      dockerfile: infra/docker/dbt.Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      DBT_PROFILES_DIR: /app/warehouse
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD:-changeme}
      DBT_AUTO_RUN_ON_START: "false"
    volumes:
      - ./warehouse:/app/warehouse
    working_dir: /app/warehouse
    restart: unless-stopped

  validation-clickhouse:
    profiles: ["validation"]
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD:-changeme}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_WRITER_PASSWORD: ${CLICKHOUSE_WRITER_PASSWORD:-naap_writer_changeme}
      CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_READER_PASSWORD:-naap_reader_changeme}
      CLICKHOUSE_SCHEMA_MODE: ${VALIDATION_CLICKHOUSE_SCHEMA_MODE:-bootstrap}
      KAFKA_BROKER_LIST: ${VALIDATION_KAFKA_BROKER_LIST:-localhost:9092}
      KAFKA_AUTO_OFFSET_RESET: latest
      KAFKA_NETWORK_GROUP: clickhouse-naap-validation-network
      KAFKA_STREAMING_GROUP: clickhouse-naap-validation-streaming
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
    volumes:
      - validation_clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/config:/etc/clickhouse-server/config.d:ro
      - ./infra/clickhouse/bootstrap:/bootstrap:ro
      - ./infra/clickhouse/migrations:/migrations:ro
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  warehouse-validation:
    profiles: ["validation"]
    build:
      context: .
      dockerfile: infra/docker/dbt.Dockerfile
    depends_on:
      validation-clickhouse:
        condition: service_healthy
    environment:
      DBT_PROFILES_DIR: /app/warehouse
      CLICKHOUSE_HOST: validation-clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD:-changeme}
      DBT_AUTO_RUN_ON_START: "false"
    volumes:
      - ./warehouse:/app/warehouse
    working_dir: /app/warehouse
    command: ["seed-run"]
    restart: "no"

  validation-go:
    profiles: ["validation"]
    image: golang:1.24-alpine
    depends_on:
      validation-clickhouse:
        condition: service_healthy
      warehouse-validation:
        condition: service_completed_successfully
    environment:
      CLICKHOUSE_ADDR: validation-clickhouse:9000
      CLICKHOUSE_DB: naap
      CLICKHOUSE_WRITER_USER: naap_writer
      CLICKHOUSE_WRITER_PASSWORD: naap_writer_changeme
      GOCACHE: /tmp/go-build-cache
      GOMODCACHE: /go/pkg/mod
    working_dir: /workspace/api
    volumes:
      - .:/workspace:ro
      - /tmp/go-build-cache:/tmp/go-build-cache
      - /tmp/go-mod-cache:/go/pkg/mod
    command: ["go", "test", "-tags=validation", "./internal/validation/...", "-v", "-count=1", "-timeout=240s"]
    restart: "no"

  # ── Observability ────────────────────────────────────────────────────────────

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    command: ["--kafka.server=kafka:29092"]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - api
      - resolver
      - clickhouse
      - kafka-exporter
      - node-exporter
      - cadvisor
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    entrypoint: ["/bin/sh", "/usr/local/bin/render-grafana-provisioning.sh"]
    depends_on:
      - prometheus
      - clickhouse
      - resolver
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/naap-overview.json
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL:-http://localhost:3000/}
      GF_PATHS_PROVISIONING: /tmp/grafana-provisioning
      GRAFANA_PROVISIONING_SRC_DIR: /etc/grafana/provisioning-src
      GRAFANA_RENDERED_PROVISIONING_DIR: /tmp/grafana-provisioning
      # Alert links are derived from this explicit public URL and repo-managed provisioning.
      CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_READER_PASSWORD:-naap_reader_changeme}
      GRAFANA_ALERTING_ENABLED: ${GRAFANA_ALERTING_ENABLED:-false}
      GRAFANA_ALERT_DISCORD_ENABLED: ${GRAFANA_ALERT_DISCORD_ENABLED:-false}
      GRAFANA_ALERT_DISCORD_WEBHOOK_URL: ${GRAFANA_ALERT_DISCORD_WEBHOOK_URL:-}
      GRAFANA_ALERT_TELEGRAM_ENABLED: ${GRAFANA_ALERT_TELEGRAM_ENABLED:-false}
      GRAFANA_ALERT_TELEGRAM_BOT_TOKEN: ${GRAFANA_ALERT_TELEGRAM_BOT_TOKEN:-}
      GRAFANA_ALERT_TELEGRAM_CHAT_ID: ${GRAFANA_ALERT_TELEGRAM_CHAT_ID:-}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning-src:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/scripts/render-provisioning.sh:/usr/local/bin/render-grafana-provisioning.sh:ro

  # ── ClickHouse ───────────────────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"   # HTTP interface (browser / curl)
      - "9000:9000"   # Native interface (clickhouse-client)
    environment:
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD:-changeme}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      # Kafka runtime config consumed by 01_apply_kafka_config.sh on first start.
      # KAFKA_BROKER_LIST: broker for ClickHouse Kafka Engine tables.
      # KAFKA_AUTO_OFFSET_RESET: earliest = full history, latest = new data only.
      CLICKHOUSE_WRITER_PASSWORD: ${CLICKHOUSE_WRITER_PASSWORD:-naap_writer_changeme}
      CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_READER_PASSWORD:-naap_reader_changeme}
      CLICKHOUSE_SCHEMA_MODE: ${CLICKHOUSE_SCHEMA_MODE:-bootstrap}
      KAFKA_BROKER_LIST: ${KAFKA_BROKER_LIST:-infra2.cloudspe.com:9092}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
      KAFKA_NETWORK_GROUP: ${KAFKA_NETWORK_GROUP:-clickhouse-naap-network}
      KAFKA_STREAMING_GROUP: ${KAFKA_STREAMING_GROUP:-clickhouse-naap-streaming}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/config:/etc/clickhouse-server/config.d:ro
      - ./infra/clickhouse/bootstrap:/bootstrap:ro
      - ./infra/clickhouse/migrations:/migrations:ro
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  clickhouse_data:
  validation_clickhouse_data:
