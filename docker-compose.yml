services:
  # ── Kafka ───────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      ENV: development
      KAFKA_BROKERS: kafka:29092
      LOG_LEVEL: debug
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_reader
      CLICKHOUSE_PASSWORD: naap_reader_changeme
    volumes:
      - ./api:/app/api
    restart: on-failure

  pipeline:
    build:
      context: .
      dockerfile: infra/docker/pipeline.Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ENV: development
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: naap-analytics-pipeline
      LOG_LEVEL: debug
    volumes:
      - ./pipeline:/app/pipeline
    restart: on-failure

  # ── ClickHouse ───────────────────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"   # HTTP interface (browser / curl)
      - "9000:9000"   # Native interface (clickhouse-client)
    environment:
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD:-changeme}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      # Kafka runtime config consumed by 01_apply_kafka_config.sh on first start.
      # KAFKA_BROKER_LIST: broker for ClickHouse Kafka Engine tables.
      # KAFKA_AUTO_OFFSET_RESET: earliest = full history, latest = new data only.
      KAFKA_BROKER_LIST: ${KAFKA_BROKER_LIST:-infra2.cloudspe.com:9092}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/config:/etc/clickhouse-server/config.d:ro
      - ./infra/clickhouse/migrations:/migrations:ro
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  clickhouse_data:
