# NAAP Analytics — Kafka UI Stack (optional, deploy separately)
#
# Provides a web UI for inspecting Kafka topics and consumer group lag.
# Deploy as a separate Portainer stack, not alongside the main stack.
#
# Required environment variables:
#   KAFKA_UI_PORT   — host port to expose Kafka UI on (default: 8080)
#   KAFKA_BROKER    — broker address (default: infra2.cloudspe.com:9092)
#
# Access at http://<host>:<KAFKA_UI_PORT>
# Restrict access via firewall or reverse proxy — no auth by default.

services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: naap
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BROKER:-infra2.cloudspe.com:9092}
