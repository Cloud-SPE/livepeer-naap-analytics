// Kafka broker JAAS configuration — SASL/SCRAM-SHA-512
//
// KafkaServer: required by Kafka when any SASL listener is configured.
// For SCRAM, no credentials are stored here — the broker validates clients
// against SCRAM hashes stored in ZooKeeper at runtime.
//
// Note: ZooKeeper client SASL is disabled via -Dzookeeper.sasl.client=false
// in KAFKA_OPTS. Our ZooKeeper has no SASL configured, so no Client section
// is needed or used.
KafkaServer {
    org.apache.kafka.common.security.scram.ScramLoginModule required;
};
