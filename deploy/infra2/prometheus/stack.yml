# NAAP Analytics — Prometheus Stack (infra2)
#
# Deploys Prometheus, Node Exporter, and cAdvisor.
# Prometheus is NOT exposed via Traefik — access via SSH tunnel only:
#   ssh -L 9090:localhost:9090 user@infra2.cloudspe.com
#   then open http://localhost:9090
#
# Prerequisites:
#   - server-prep.sh has been run (creates /opt/naap/prometheus/prometheus.yml)
#   - All other stacks deployed (so scrape targets are reachable)
#
# No environment variables required for this stack.

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: naap-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - /opt/naap/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - naap_prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  node-exporter:
    image: prom/node-exporter:latest
    container_name: naap-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: naap-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

volumes:
  naap_prometheus_data:

networks:
  default:
    name: ingress
    external: true
