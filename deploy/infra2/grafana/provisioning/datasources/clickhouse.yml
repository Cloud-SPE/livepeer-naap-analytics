apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse_prod
    access: proxy
    editable: false
    jsonData:
      server: naap-analytics-clickhouse
      port: 8123
      protocol: http
      username: naap_reader
      defaultDatabase: naap
    secureJsonData:
      password: ${CLICKHOUSE_READER_PASSWORD}
