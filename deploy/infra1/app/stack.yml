# NAAP Analytics — API Stack (infra2)
#
# Deploys the NAAP Go API service, exposed via Traefik at naap-api.cloudspe.com.
#
# Prerequisites:
#   - naap-clickhouse stack deployed and healthy
#   - Image built and pushed: make push-api
#   - Traefik running on the ingress network with cloudflare cert resolver
#
# ── REQUIRED ENVIRONMENT VARIABLES ────────────────────────────────────────────
#   CLICKHOUSE_READER_PASSWORD   — password for naap_reader ClickHouse user
#   CLICKHOUSE_WRITER_PASSWORD   — password for naap_writer ClickHouse user
#
# ── OPTIONAL ENVIRONMENT VARIABLES ────────────────────────────────────────────
#   IMAGE_TAG              — image tag to deploy (default: latest)
#   RATE_LIMIT_RPS         — requests/sec per IP (default: 100)
#   RATE_LIMIT_BURST       — burst allowance (default: 200)
#   LOG_LEVEL              — debug | info | warn | error (default: info)
#   ENRICHMENT_ENABLED     — enable/disable enrichment worker (default: true)
#   ENRICHMENT_INTERVAL    — enrichment poll interval (default: 5m)
#   LIVEPEER_API_URL       — Livepeer public API base URL

services:
  api:
    image: tztcloud/naap-api:${IMAGE_TAG:-latest}
    container_name: naap-analytics-api
    restart: unless-stopped
    environment:
      PORT: "8000"
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}

      CLICKHOUSE_ADDR: naap-analytics-clickhouse:9000
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_reader
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_READER_PASSWORD}
      CLICKHOUSE_WRITER_USER: naap_writer
      CLICKHOUSE_WRITER_PASSWORD: ${CLICKHOUSE_WRITER_PASSWORD}

      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-100}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-200}
      ENRICHMENT_ENABLED: ${ENRICHMENT_ENABLED:-true}
      ENRICHMENT_INTERVAL: ${ENRICHMENT_INTERVAL:-5m}
      LIVEPEER_API_URL: ${LIVEPEER_API_URL:-https://livepeer-api.livepeer.cloud}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ingress"
      - "traefik.http.routers.naap-api.entrypoints=websecure"
      - "traefik.http.routers.naap-api.rule=Host(`${NAAP_API_DOMAIN}`)"
      - "traefik.http.routers.naap-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.naap-api.service=naap-api"
      - "traefik.http.routers.naap-api.middlewares=naap-api-ratelimit"
      - "traefik.http.services.naap-api.loadbalancer.server.port=8000"
      - "traefik.http.services.naap-api.loadbalancer.server.scheme=http"
      - "traefik.http.services.naap-api.loadbalancer.passhostheader=true"
      - "traefik.http.middlewares.naap-api-ratelimit.ratelimit.average=${RATE_LIMIT_RPS:-100}"
      - "traefik.http.middlewares.naap-api-ratelimit.ratelimit.burst=${RATE_LIMIT_BURST:-200}"
      - "traefik.http.middlewares.naap-api-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"

networks:
  default:
    name: ingress
    external: true
