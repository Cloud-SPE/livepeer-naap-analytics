# NAAP Analytics — Grafana Stack (infra2)
#
# Deploys Grafana with NAAP dashboards, exposed via Traefik at grafana.livepeer.cloud.
# Dashboards and datasource provisioning are bind-mounted from /opt/naap/grafana/.
#
# Prerequisites:
#   - server-prep.sh has been run (populates /opt/naap/grafana/)
#   - naap-clickhouse and naap-prometheus stacks deployed
#   - Traefik running on the ingress network with cloudflare cert resolver
#
# ── REQUIRED ENVIRONMENT VARIABLES ────────────────────────────────────────────
#   GF_ADMIN_PASSWORD          — Grafana admin user password
#   GRAFANA_PUBLIC_URL         — fully qualified Grafana URL used for alert links
#   CLICKHOUSE_READER_PASSWORD — password for naap_reader (ClickHouse datasource)
#   GRAFANA_ALERTING_ENABLED          — true to enable repo-managed Grafana alerting
#   GRAFANA_ALERT_DISCORD_ENABLED     — true to enable Discord delivery
#   GRAFANA_ALERT_DISCORD_WEBHOOK_URL — required when Discord delivery is enabled
#   GRAFANA_ALERT_TELEGRAM_ENABLED    — true to enable Telegram delivery
#   GRAFANA_ALERT_TELEGRAM_BOT_TOKEN  — required when Telegram delivery is enabled
#   GRAFANA_ALERT_TELEGRAM_CHAT_ID    — required when Telegram delivery is enabled
#
# ── OPTIONAL ENVIRONMENT VARIABLES ────────────────────────────────────────────
#   GF_ADMIN_USER              — Grafana admin username (default: admin)

services:

  grafana:
    image: grafana/grafana:latest
    entrypoint: ["/bin/sh", "/usr/local/bin/render-grafana-provisioning.sh"]
    container_name: naap-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/naap-overview.json
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL:-https://grafana.livepeer.cloud/}
      GF_PATHS_PROVISIONING: /tmp/grafana-provisioning
      GRAFANA_PROVISIONING_SRC_DIR: /etc/grafana/provisioning-src
      GRAFANA_RENDERED_PROVISIONING_DIR: /tmp/grafana-provisioning

      # Alert links are derived from this public URL and repo-managed provisioning.
      CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_READER_PASSWORD}
      GRAFANA_ALERTING_ENABLED: ${GRAFANA_ALERTING_ENABLED:-false}
      GRAFANA_ALERT_DISCORD_ENABLED: ${GRAFANA_ALERT_DISCORD_ENABLED:-false}
      GRAFANA_ALERT_DISCORD_WEBHOOK_URL: ${GRAFANA_ALERT_DISCORD_WEBHOOK_URL:-}
      GRAFANA_ALERT_TELEGRAM_ENABLED: ${GRAFANA_ALERT_TELEGRAM_ENABLED:-false}
      GRAFANA_ALERT_TELEGRAM_BOT_TOKEN: ${GRAFANA_ALERT_TELEGRAM_BOT_TOKEN:-}
      GRAFANA_ALERT_TELEGRAM_CHAT_ID: ${GRAFANA_ALERT_TELEGRAM_CHAT_ID:-}
    volumes:
      - /opt/naap/grafana/provisioning:/etc/grafana/provisioning-src:ro
      - /opt/naap/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /opt/naap/grafana/scripts/render-provisioning.sh:/usr/local/bin/render-grafana-provisioning.sh:ro
      - naap_grafana_data:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ingress"
      - "traefik.http.routers.naap-grafana.entrypoints=websecure"
      - "traefik.http.routers.naap-grafana.rule=Host(`${NAAP_GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.naap-grafana.tls.certresolver=cloudflare"
      - "traefik.http.routers.naap-grafana.service=naap-grafana"
      - "traefik.http.services.naap-grafana.loadbalancer.server.port=3000"
      - "traefik.http.services.naap-grafana.loadbalancer.server.scheme=http"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  naap_grafana_data:
      external: true

networks:
  default:
    name: ingress
    external: true
