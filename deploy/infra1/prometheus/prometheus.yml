global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: naap-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: resolver
    static_configs:
      - targets: ["resolver:9102"]
    metrics_path: /metrics

  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ["metrics-infra2.livepeer.cloud"]
        labels:
          host: infra2
    metrics_path: /kafka-exporter/metrics

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: infra1

  - job_name: node-infra2
    static_configs:
      - targets: ["metrics-infra2.livepeer.cloud"]
        labels:
          host: infra2
    metrics_path: /node-exporter/metrics

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          host: infra1

  - job_name: cadvisor-infra2
    static_configs:
      - targets: ["metrics-infra2.livepeer.cloud"]
        labels:
          host: infra2
    metrics_path: /cadvisor/metrics

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]