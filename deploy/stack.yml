# NAAP Analytics — Production Portainer Stack
#
# Deploy via Portainer: Stacks → Add Stack → paste this file → set env vars below.
#
# Required environment variables (set in Portainer stack configuration):
#
#   CLICKHOUSE_ADMIN_PASSWORD   — ClickHouse admin/naap_admin user password
#   CLICKHOUSE_READER_PASSWORD  — naap_reader password (used by the API)
#   CLICKHOUSE_WRITER_PASSWORD  — naap_writer password (reserved for future use)
#
# Optional environment variables (have sensible defaults):
#
#   IMAGE_TAG                   — image tag to deploy (default: latest)
#   KAFKA_BROKER_LIST           — broker for ClickHouse Kafka Engine (default: infra2.cloudspe.com:9092)
#   KAFKA_AUTO_OFFSET_RESET     — earliest | latest (default: latest)
#   KAFKA_NETWORK_GROUP         — ClickHouse consumer group for network_events (default: clickhouse-naap-network)
#   KAFKA_STREAMING_GROUP       — ClickHouse consumer group for streaming_events (default: clickhouse-naap-streaming)
#   KAFKA_BROKERS               — broker(s) for the API service (default: infra2.cloudspe.com:9092)
#   API_PORT                    — host port to expose the API on (default: 8000)
#   RATE_LIMIT_RPS              — requests/sec per IP (default: 100)
#   RATE_LIMIT_BURST            — burst allowance (default: 200)
#   OTLP_ENDPOINT               — OTLP trace endpoint; empty disables telemetry (default: "")
#   LOG_LEVEL                   — info | debug | warn | error (default: info)

services:

  # ── ClickHouse ───────────────────────────────────────────────────────────────
  clickhouse-db:
    image: tztcloud/naap-clickhouse:${IMAGE_TAG:-latest}
    restart: unless-stopped
    container_name: naap-analytics-clickhouse
    environment:
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_WRITER_PASSWORD: ${CLICKHOUSE_WRITER_PASSWORD}
      CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_READER_PASSWORD}
      # Kafka Engine config — baked into DDL at migration time
      KAFKA_BROKER_LIST: ${KAFKA_BROKER_LIST:-infra2.cloudspe.com:9092}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-latest}
      KAFKA_NETWORK_GROUP: ${KAFKA_NETWORK_GROUP:-clickhouse-naap-network}
      KAFKA_STREAMING_GROUP: ${KAFKA_STREAMING_GROUP:-clickhouse-naap-streaming}
    volumes:
      - naap-analytics_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    # ClickHouse ports are intentionally not exposed externally.
    # Access via: docker exec or an SSH tunnel to localhost:8123 / localhost:9000.
    # Uncomment the lines below only if direct external access is needed and
    # the host firewall restricts access appropriately.
    # ports:
    #   - "8123:8123"
    #   - "9000:9000"

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    image: tztcloud/naap-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    container_name: naap-analytics-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PORT: "8000"
      ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CLICKHOUSE_ADDR: naap-analytics-clickhouse:9000
      CLICKHOUSE_DB: naap
      CLICKHOUSE_USER: naap_reader
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_READER_PASSWORD}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-infra2.cloudspe.com:9092}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-100}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-200}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
    depends_on:
      clickhouse-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.livepeer-naap-api.entrypoints=websecure"
      - "traefik.http.routers.livepeer-naap-api.service=livepeer-naap-api"
      - "traefik.http.services.livepeer-naap-api.loadbalancer.passhostheader=true"
      - "traefik.http.services.livepeer-naap-api.loadbalancer.server.port=8000"
      - "traefik.http.services.livepeer-naap-api.loadbalancer.server.scheme=http"
      - "traefik.http.routers.livepeer-naap-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.livepeer-naap-api.rule=Host(`naap-api.cloudspe.com`)"
      - "traefik.http.routers.livepeer-naap-api.middlewares=naap-api-ratelimit"
      - "traefik.http.middlewares.naap-api-ratelimit.ratelimit.average=${RATE_LIMIT_RPS:-100}"
      - "traefik.http.middlewares.naap-api-ratelimit.ratelimit.burst=${RATE_LIMIT_BURST:-200}"
      - "traefik.http.middlewares.naap-api-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"
volumes:
  naap-analytics_clickhouse_data:
    external: true

networks:
  default:
    name: ingress
    external: true