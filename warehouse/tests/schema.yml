version: 2

models:
  - name: fact_workflow_sessions
    columns:
      - name: canonical_session_key
        tests:
          - unique
          - not_null
      - name: attribution_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'hardware_less', 'stale', 'ambiguous', 'unresolved']
  - name: fact_workflow_payment_links
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: link_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['resolved', 'unresolved']
  - name: fact_workflow_status_hours
    columns:
      - name: canonical_session_key
        tests:
          - not_null
