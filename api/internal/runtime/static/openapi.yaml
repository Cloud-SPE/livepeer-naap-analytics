openapi: 3.0.3
info:
  title: NAAP Analytics API
  version: "1"
  description: |
    Read-only analytics API for the Livepeer AI Network Analytics Platform (NAAP).
    Backed by ClickHouse materialized views fed from two Kafka topics:
    `streaming_events` (live video-to-video streaming sessions, originating from the
    cloudspe org) and `network_events` (AI batch and BYOC request/response jobs,
    originating from the daydream org).

    **Three job types co-exist in this system:**
    - `stream` — persistent live video-to-video streaming sessions tracked in
      `streaming_events`. Metrics for this type appear in the `/v1/net/`, `/v1/perf/`,
      `/v1/sla/`, `/v1/network/`, `/v1/gpu/`, and most `/v1/dashboard/` endpoints.
    - `ai-batch` — fixed-pipeline discrete AI inference calls (text-to-image,
      image-to-image, image-to-video, upscale, audio-to-text, llm, segment-anything-2,
      image-to-text, text-to-speech) tracked in `network_events`. Metrics appear in
      `/v1/ai-batch/`, `/v1/jobs/`, and `/v1/dashboard/jobs/` endpoints.
    - `byoc` — Bring Your Own Capability jobs with dynamic capability names
      (e.g. `openai-chat-completions`, `openai-image-generation`,
      `openai-text-embeddings`) also tracked in `network_events`. Metrics appear in
      `/v1/byoc/`, `/v1/jobs/`, and `/v1/dashboard/jobs/` endpoints.

    **Streaming data and job data are fully separate namespaces.** No endpoint
    mixes streaming sessions with AI-batch or BYOC jobs. When in doubt, read the
    endpoint description carefully for its exact coverage.

    **Data pipeline:** Raw events land in ClickHouse via Kafka Engine tables, flow
    through Materialized Views into normalized tables, are transformed by dbt into
    canonical views, and are finally served from API-specific aggregation tables.
    Attribution of jobs to orchestrators and GPU hardware is performed by a Go
    resolver service that writes to `canonical_ai_batch_job_store` and
    `canonical_byoc_job_store` using a selection-centered attribution engine.
    Attribution status values are: `resolved` (full orch + GPU confirmed),
    `hardware_less` (orch confirmed, no GPU data), `stale` (only a stale capability
    snapshot was available), `ambiguous` (multiple incompatible candidates found),
    `unresolved` (no match found).

    **Rate limiting:** 100 req/s sustained, burst 200 per IP.
    Exceeded requests receive `429 Too Many Requests`.

    **Default time window:** last 24 hours when `start`/`end` are omitted.

    **WEI values** (payment amounts) are returned as decimal strings to avoid
    float64 precision loss (e.g. `"1234500000000000000"`).

    **All timestamps are UTC.**

    **Cursor pagination** uses base64-encoded JSON position markers. Pass the
    `next_cursor` value from the previous response as the `cursor` query parameter
    to retrieve the next page. Omit `cursor` on the first request.

    **Known null fields network-wide:** `region` is always null — it is not
    captured in any current event schema. `runner_version` and `cuda_version` in
    GPU metrics are always null.

servers:
  - url: https://naap-api.livepeer.cloud
    description: Production
  - url: https://naap-api.cloudspe.com
    description: CloudSPE
  - url: http://localhost:8000
    description: Local development

tags:
  - name: Health
  - name: Network
    description: |
      Orchestrator network state and model availability for the standard Livepeer
      AI protocol. All endpoints in this tag are sourced from orchestrator
      capability heartbeats and cover only Livepeer-protocol orchestrators. BYOC
      workers — which register via `worker_lifecycle` Kafka events and do not use
      the capability heartbeat protocol — do NOT appear in any Network endpoint.
      For BYOC worker availability, use `/v1/byoc/workers`.
  - name: Capacity
    description: |
      GPU supply versus active stream demand per (pipeline, model), sourced from
      `naap.canonical_capability_hardware_inventory` joined with
      `naap.canonical_active_stream_state_latest_store`. BYOC pipelines appear in
      capacity data because BYOC workers do register capability snapshots, but
      their `ActiveStreams` count is always zero because BYOC jobs are discrete
      request/response calls — not persistent streaming sessions — and are never
      reflected in the stream state table.
  - name: SLA
    description: |
      SLA compliance metrics for live streaming sessions per
      (orchestrator, pipeline, model, gpu, hour). Sourced from
      `naap.api_sla_compliance_store`. This tag covers streaming sessions only —
      AI-batch and BYOC job SLA is available at `/v1/jobs/sla`.
  - name: Demand
    description: |
      Network demand metrics for live streaming sessions per
      (gateway, pipeline, model, hour) and GPU-sliced variants. All endpoints
      under this tag are sourced from streaming-session tables (`naap.api_network_demand`
      and `naap.api_gpu_network_demand`) and cover streaming sessions only.
      AI-batch and BYOC demand is tracked separately at `/v1/jobs/demand`.
  - name: GPUMetrics
    description: |
      Per-GPU streaming performance metrics per (orchestrator, pipeline, model, gpu, hour),
      sourced from `naap.api_sla_compliance_store` (SLA hourly buckets). Covers streaming
      sessions only — not AI-batch or BYOC jobs. Several fields (`runner_version`,
      `cuda_version`, `fps_jitter_coefficient`, `region`) are always null because
      they are not captured in the current event schema.
  - name: AIBatch
    description: |
      AI batch job analytics for the nine fixed Livepeer AI pipelines:
      text-to-image, image-to-image, image-to-video, upscale, audio-to-text, llm,
      segment-anything-2, image-to-text, and text-to-speech. Data is sourced from
      `naap.canonical_ai_batch_jobs`, which is populated by the Go attribution
      resolver processing events from the `network_events` Kafka topic. Job records
      include attribution fields (`gpu_model`, `attribution_status`) written by the
      resolver. BYOC capabilities do NOT appear in any AIBatch endpoint.
  - name: BYOC
    description: |
      BYOC (Bring Your Own Capability) job analytics for dynamic capabilities such
      as `openai-chat-completions`, `openai-image-generation`, and
      `openai-text-embeddings`. Data is sourced from `naap.canonical_byoc_jobs` and
      `naap.canonical_byoc_workers`, populated by the resolver from `network_events`
      Kafka events. BYOC workers register via `worker_lifecycle` events rather than
      the standard Livepeer capability heartbeat, so they do not appear in
      `/v1/net/models` or `/v1/net/orchestrators`. The set of capability names is
      fully dynamic and never hardcoded in the API. In `/v1/jobs/sla`, BYOC rows
      use `orchestrator_uri` for the orchestrator service URL (e.g.
      `https://livepeer-ai.xodeapp.xyz:18935`) because BYOC jobs are identified
      by URL rather than on-chain address.
  - name: Jobs
    description: |
      Cross-type demand, SLA, and model-performance endpoints that cover both
      AI-batch and BYOC jobs. None of the Jobs endpoints include streaming session
      data. The `job_type` field in every response distinguishes `ai-batch` from
      `byoc` rows. `/v1/jobs/by-model` is the only endpoint in the entire API that
      shows AI-batch and BYOC model performance side by side in a single response.
  - name: Dashboard
    description: |
      Pre-aggregated, UI-ready endpoints for the NAAP dashboard widgets. KPI,
      pipeline usage, orchestrator table, GPU capacity, pipeline catalog, pricing,
      and live job feed widgets are all sourced from streaming-session data. The
      jobs sub-group (`/v1/dashboard/jobs/*`) covers AI-batch and BYOC jobs.
      Several dashboard endpoints return a plain JSON array (no `data` wrapper):
      `/v1/dashboard/pipeline-catalog`, `/v1/dashboard/pricing`, and
      `/v1/dashboard/job-feed`.

# ── Common parameter definitions ──────────────────────────────────────────────

components:
  parameters:
    org:
      name: org
      in: query
      description: Filter to a single organisation. Omit for all orgs.
      schema:
        type: string
        enum: [daydream, cloudspe]
    start:
      name: start
      in: query
      description: Window start (RFC3339). Defaults to 24 hours ago.
      schema:
        type: string
        format: date-time
        example: "2026-03-01T00:00:00Z"
    end:
      name: end
      in: query
      description: Window end (RFC3339). Defaults to now.
      schema:
        type: string
        format: date-time
        example: "2026-03-24T23:59:59Z"
    limit:
      name: limit
      in: query
      description: Maximum rows to return (1–1000).
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50
    cursor:
      name: cursor
      in: query
      description: Opaque cursor returned by the previous page. Omit on the first page.
      schema:
        type: string
    pipeline:
      name: pipeline
      in: query
      description: Filter by pipeline name (e.g. `text-to-image`).
      schema:
        type: string
    orch_address:
      name: orch_address
      in: query
      description: Filter by orchestrator Ethereum address (lowercased).
      schema:
        type: string
        example: ""
    active_only:
      name: active_only
      in: query
      description: When `true`, return only orchestrators active within the last 15 minutes.
      schema:
        type: boolean
        default: false
    stream_id:
      name: stream_id
      in: query
      schema:
        type: string
    failure_type:
      name: failure_type
      in: query
      description: Filter failure events by type.
      schema:
        type: string
        enum: [no_orch_available, orch_swap, inference_restart, inference_error]
    address_path:
      name: address
      in: path
      required: true
      description: Orchestrator Ethereum address (lowercased).
      schema:
        type: string
        example: ""
    window:
      name: window
      in: query
      description: |
        Lookback window as a duration string. Accepts Go duration syntax (`24h`, `90m`, `30s`)
        or a day suffix (`7d`). Capped per-endpoint — see endpoint description for limits.
      schema:
        type: string
        example: "24h"
        default: "24h"
    orchestrator_address:
      name: orchestrator_address
      in: query
      description: Filter by orchestrator Ethereum address (lowercased).
      schema:
        type: string
        example: ""
    orchestrator_uri:
      name: orchestrator_uri
      in: query
      description: Filter by non-streaming orchestrator service URI (lowercased).
      schema:
        type: string
        example: "https://orch.example.com:8935"
    pipeline_id:
      name: pipeline_id
      in: query
      description: Filter by pipeline name (e.g. `streamdiffusion-sdxl-v2v`).
      schema:
        type: string
    model_id:
      name: model_id
      in: query
      description: Filter by model identifier.
      schema:
        type: string
    gpu_id:
      name: gpu_id
      in: query
      description: Filter by GPU slot identifier.
      schema:
        type: string
    gateway_filter:
      name: gateway
      in: query
      description: Filter by gateway Ethereum address.
      schema:
        type: string
    gpu_model_name:
      name: gpu_model_name
      in: query
      description: Filter by GPU model name (e.g. `RTX-4090`).
      schema:
        type: string
    runner_version:
      name: runner_version
      in: query
      description: Filter by runner software version.
      schema:
        type: string
    cuda_version:
      name: cuda_version
      in: query
      description: Filter by CUDA version string.
      schema:
        type: string
    region:
      name: region
      in: query
      description: Filter by geographic region (currently always null — reserved for future use).
      schema:
        type: string

  schemas:

    # ── AI Batch (R17) ───────────────────────────────────────────────────────

    AIBatchJobSummary:
      type: object
      properties:
        pipeline:        { type: string, description: "Fixed pipeline name (e.g. text-to-image, llm)" }
        total_jobs:      { type: integer, format: int64 }
        selected_jobs:   { type: integer, format: int64, description: "Jobs with explicit orchestrator selection evidence." }
        no_orch_jobs:    { type: integer, format: int64, description: "Jobs that failed before selection with explicit no_orchestrators evidence." }
        unknown_jobs:    { type: integer, format: int64, description: "Jobs without enough evidence to classify selection outcome." }
        success_rate:    { type: number, format: double, description: "0.0–1.0" }
        avg_duration_ms: { type: number, format: double }
        avg_latency_score: { type: number, format: double }
        selected_attribution_worked_rate: { type: number, format: double, description: "Worked attribution rate on selection_outcome = selected, where worked = resolved + hardware_less + stale." }
      required: [pipeline, total_jobs, selected_jobs, no_orch_jobs, unknown_jobs, success_rate, avg_duration_ms, avg_latency_score, selected_attribution_worked_rate]

    AIBatchJobRecord:
      type: object
      properties:
        request_id:    { type: string }
        org:           { type: string }
        gateway:       { type: string }
        pipeline:      { type: string }
        model_id:      { type: string }
        completed_at:  { type: string, format: date-time }
        success:       { type: boolean, nullable: true }
        tries:         { type: integer, format: int64 }
        duration_ms:   { type: integer, format: int64 }
        orch_url:      { type: string }
        selection_outcome: { type: string, enum: [selected, no_orch, unknown] }
        latency_score: { type: number, format: double }
        price_per_unit: { type: number, format: double }
        error_type:    { type: string }
        error:         { type: string }
        gpu_model:     { type: string }
        attribution_status: { type: string, enum: [resolved, hardware_less, stale, ambiguous, unresolved] }
      required: [request_id, org, gateway, pipeline, model_id, completed_at, tries, duration_ms, orch_url, selection_outcome, latency_score, price_per_unit, error_type, error, attribution_status]

    AIBatchLLMSummary:
      type: object
      properties:
        model:             { type: string }
        total_requests:    { type: integer, format: int64 }
        success_rate:      { type: number, format: double, description: "0.0–1.0" }
        avg_tokens_per_sec: { type: number, format: double }
        avg_ttft_ms:       { type: number, format: double }
        avg_total_tokens:  { type: number, format: double }
      required: [model, total_requests, success_rate, avg_tokens_per_sec, avg_ttft_ms, avg_total_tokens]

    # ── BYOC (R18) ───────────────────────────────────────────────────────────

    BYOCJobSummary:
      type: object
      description: |
        Per-capability aggregate for BYOC jobs. Capability values are stored
        verbatim (e.g. "openai-chat-completions") and never hardcoded.
      properties:
        capability:      { type: string }
        total_jobs:      { type: integer, format: int64 }
        selected_jobs:   { type: integer, format: int64, description: "Jobs with explicit orchestrator selection evidence." }
        no_orch_jobs:    { type: integer, format: int64, description: "Jobs that failed before selection with explicit no_orchestrator evidence. Under the current raw contract this is usually zero." }
        unknown_jobs:    { type: integer, format: int64, description: "Jobs without enough evidence to classify selection outcome." }
        success_rate:    { type: number, format: double, description: "0.0–1.0" }
        avg_duration_ms: { type: number, format: double }
        selected_attribution_worked_rate: { type: number, format: double, description: "Worked attribution rate on selection_outcome = selected, where worked = resolved + hardware_less + stale." }
      required: [capability, total_jobs, selected_jobs, no_orch_jobs, unknown_jobs, success_rate, avg_duration_ms, selected_attribution_worked_rate]

    BYOCJobRecord:
      type: object
      properties:
        request_id:   { type: string }
        org:          { type: string }
        capability:   { type: string }
        completed_at: { type: string, format: date-time }
        success:      { type: boolean, nullable: true }
        duration_ms:  { type: integer, format: int64 }
        http_status:  { type: integer, format: int64 }
        orch_address: { type: string }
        orch_url:     { type: string }
        selection_outcome: { type: string, enum: [selected, no_orch, unknown] }
        worker_url:   { type: string }
        error:        { type: string }
        gpu_model:     { type: string }
        attribution_status: { type: string, enum: [resolved, hardware_less, stale, ambiguous, unresolved] }
      required: [request_id, org, capability, completed_at, duration_ms, http_status, orch_address, orch_url, selection_outcome, worker_url, error, attribution_status]

    BYOCWorkerSummary:
      type: object
      properties:
        capability:        { type: string }
        worker_count:      { type: integer, format: int64 }
        models:
          type: array
          items: { type: string }
        avg_price_per_unit: { type: number, format: double }
      required: [capability, worker_count, models, avg_price_per_unit]

    BYOCAuthSummary:
      type: object
      properties:
        capability:    { type: string }
        total_events:  { type: integer, format: int64 }
        success_rate:  { type: number, format: double, description: "0.0–1.0" }
        failure_count: { type: integer, format: int64 }
      required: [capability, total_events, success_rate, failure_count]

    # ── Jobs — request/response (R19) ───────────────────────────────────────

    JobsDemandRow:
      type: object
      properties:
        window_start:    { type: string, format: date-time }
        org:             { type: string, nullable: true }
        gateway:         { type: string }
        pipeline_id:     { type: string }
        model_id:        { type: string, nullable: true }
        job_type:        { type: string, enum: [ai-batch, byoc] }
        job_count:       { type: integer, format: int64 }
        success_count:   { type: integer, format: int64 }
        success_rate:    { type: number, format: double }
        avg_duration_ms: { type: number, format: double }
        total_minutes:   { type: number, format: double }
      required: [window_start, gateway, pipeline_id, job_type, job_count, success_count, success_rate, avg_duration_ms, total_minutes]

    JobsSLARow:
      type: object
      properties:
        window_start:         { type: string, format: date-time }
        org:                  { type: string, nullable: true }
        orchestrator_uri:     { type: string }
        pipeline_id:          { type: string }
        model_id:             { type: string, nullable: true }
        gpu_id:               { type: string, nullable: true }
        job_type:             { type: string, enum: [ai-batch, byoc] }
        job_count:            { type: integer, format: int64 }
        success_count:        { type: integer, format: int64 }
        success_rate:         { type: number, format: double }
        avg_duration_ms:      { type: number, format: double }
        sla_score:            { type: number, format: double, nullable: true }
      required: [window_start, orchestrator_uri, pipeline_id, job_type, job_count, success_count, success_rate, avg_duration_ms]

    JobModelPerformance:
      type: object
      properties:
        model_id:        { type: string }
        pipeline:        { type: string }
        job_type:        { type: string, enum: [ai-batch, byoc] }
        job_count:       { type: integer, format: int64 }
        warm_orch_count: { type: integer, format: int64 }
        avg_duration_ms: { type: number, format: double, nullable: true }
        p50_duration_ms: { type: number, format: double, nullable: true }
        p99_duration_ms: { type: number, format: double, nullable: true }
      required: [model_id, pipeline, job_type, job_count, warm_orch_count]

    # ── Dashboard (R16) ──────────────────────────────────────────────────────

    DashboardMetricDelta:
      type: object
      properties:
        value: { type: number, format: double }
        delta: { type: number, format: double, description: "Period-over-period % change" }
      required: [value, delta]

    DashboardHourlyBucket:
      type: object
      properties:
        hour: { type: string, format: date-time }
        value: { type: number, format: double }
      required: [hour, value]

    DashboardKPI:
      type: object
      properties:
        successRate:          { $ref: "#/components/schemas/DashboardMetricDelta" }
        orchestratorsOnline:  { $ref: "#/components/schemas/DashboardMetricDelta" }
        dailyUsageMins:       { $ref: "#/components/schemas/DashboardMetricDelta", description: "Total stream-minutes from api_network_demand" }
        dailySessionCount:    { $ref: "#/components/schemas/DashboardMetricDelta" }
        dailyNetworkFeesEth:  { $ref: "#/components/schemas/DashboardMetricDelta" }
        timeframeHours:       { type: integer }
        hourlySessions:
          type: array
          items: { $ref: "#/components/schemas/DashboardHourlyBucket" }
        hourlyUsage:
          type: array
          items: { $ref: "#/components/schemas/DashboardHourlyBucket" }

    DashboardPipelineModelMins:
      type: object
      properties:
        model:    { type: string }
        mins:     { type: number, format: double }
        sessions: { type: integer, format: int64 }
        avgFps:   { type: number, format: double }

    DashboardPipelineUsage:
      type: object
      properties:
        name:     { type: string }
        sessions: { type: integer, format: int64 }
        mins:     { type: number, format: double }
        avgFps:   { type: number, format: double }
        job_type: { type: string, description: "Job type (e.g. stream, ai-batch, byoc). Omitted for streaming pipelines.", nullable: true }
        modelMins:
          type: array
          items: { $ref: "#/components/schemas/DashboardPipelineModelMins" }
          description: "Per-model breakdown. Omitted when not available."

    DashboardPipelineModelOffer:
      type: object
      properties:
        pipelineId: { type: string }
        modelIds:
          type: array
          items: { type: string }

    DashboardOrchestrator:
      type: object
      properties:
        address:              { type: string }
        ensName:              { type: string, description: "ENS name if registered, empty otherwise" }
        serviceUri:           { type: string, description: "Orchestrator service URI (e.g. https://host:8935)" }
        knownSessions:        { type: integer, format: int64 }
        successSessions:      { type: integer, format: int64 }
        successRatio:         { type: number, format: double }
        effectiveSuccessRate: { type: number, format: double, nullable: true }
        noSwapRatio:          { type: number, format: double, nullable: true }
        slaScore:             { type: number, format: double, nullable: true, description: "Latest available hourly contracted sla_score for the orchestrator within the requested dashboard window." }
        slaWindowStart:       { type: string, format: date-time, nullable: true, description: "Hour bucket that produced slaScore." }
        pipelines:
          type: array
          items: { type: string }
        pipelineModels:
          type: array
          items: { $ref: "#/components/schemas/DashboardPipelineModelOffer" }
        gpuCount: { type: integer, format: int64 }

    DashboardGPUModelCapacity:
      type: object
      properties:
        model: { type: string }
        count: { type: integer, format: int64 }

    DashboardGPUCapacityPipelineModel:
      type: object
      properties:
        model: { type: string }
        gpus:  { type: integer, format: int64 }

    DashboardGPUCapacityPipeline:
      type: object
      properties:
        name: { type: string }
        gpus: { type: integer, format: int64 }
        models:
          type: array
          items: { $ref: "#/components/schemas/DashboardGPUCapacityPipelineModel" }

    DashboardGPUCapacity:
      type: object
      properties:
        totalGPUs:         { type: integer, format: int64 }
        activeGPUs:        { type: integer, format: int64 }
        availableCapacity: { type: number, format: double, description: "Fraction 0–1" }
        models:
          type: array
          items: { $ref: "#/components/schemas/DashboardGPUModelCapacity" }
        pipelineGPUs:
          type: array
          items: { $ref: "#/components/schemas/DashboardGPUCapacityPipeline" }

    DashboardPipelineCatalogEntry:
      type: object
      properties:
        id:      { type: string }
        name:    { type: string }
        models:
          type: array
          items: { type: string }
        regions:
          type: array
          items: { type: string }

    DashboardPipelinePricing:
      type: object
      properties:
        pipeline:           { type: string }
        model:              { type: string }
        orchCount:          { type: integer, format: int64 }
        priceMinWeiPerUnit: { type: integer, format: int64 }
        priceMaxWeiPerUnit: { type: integer, format: int64 }
        priceAvgWeiPerUnit: { type: number, format: double }
        pixelsPerUnit:      { type: integer, format: int64 }

    DashboardJobFeedItem:
      type: object
      properties:
        id:              { type: string }
        pipeline:        { type: string }
        model:           { type: string, nullable: true }
        gateway:         { type: string }
        orchestratorUrl: { type: string }
        state:           { type: string }
        job_type:        { type: string, description: "Job type (e.g. stream, ai-batch, byoc). Omitted for streaming.", nullable: true }
        inputFps:        { type: number, format: double }
        outputFps:       { type: number, format: double }
        firstSeen:       { type: string, format: date-time }
        lastSeen:        { type: string, format: date-time }
        durationSeconds: { type: number, format: double, nullable: true }

    # ── Dashboard Jobs ───────────────────────────────────────────────────────

    DashboardJobsStats:
      type: object
      description: Aggregate metrics for one job family (AI batch or BYOC).
      properties:
        total_jobs:     { type: integer, format: int64 }
        selected_jobs:  { type: integer, format: int64 }
        no_orch_jobs:   { type: integer, format: int64 }
        unknown_jobs:   { type: integer, format: int64 }
