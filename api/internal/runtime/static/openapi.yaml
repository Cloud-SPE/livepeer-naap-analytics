# ── Paths ──────────────────────────────────────────────────────────────────────

paths:

  /healthz:
    get:
      tags: [Health]
      summary: Health check
      description: |
        Returns 200 with `{"status":"ok"}` if the service and ClickHouse are healthy.
        Returns 503 if the ClickHouse ping fails. Use this endpoint for liveness and
        readiness probes — it performs a cheap no-op query against ClickHouse to
        confirm connectivity before returning.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
        "503":
          description: ClickHouse is unreachable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: degraded

  # ── Network ────────────────────────────────────────────────────────────────

  /v1/net/orchestrators:
    get:
      tags: [Network]
      summary: List orchestrators
      description: |
        Returns a cursor-paginated list of all known Livepeer AI orchestrators,
        ordered by `last_seen` descending. Backed by `naap.api_latest_orchestrator_state`,
        which is a ClickHouse view over the orchestrator capability heartbeat stream.
        Each row represents one orchestrator's most recent known state.

        `IsActive` is `true` when the orchestrator was seen within the last 15 minutes.
        Use `?active_only=true` to filter to currently active orchestrators only.

        `RawCapabilities` is the full JSON blob from the orchestrator's capability
        heartbeat — it contains the complete pipeline/model/price advertisement as
        broadcast by the node. Consumers may parse this blob to extract fine-grained
        capability details.

        **Important:** `total_count` in the pagination envelope is always `null`
        and is not computed. Do not rely on it for page-count calculations — use
        `has_more` instead to determine whether additional pages exist.

        **BYOC workers do not appear here.** BYOC workers register via
        `worker_lifecycle` Kafka events rather than the Livepeer capability heartbeat
        protocol, so they are never written to `api_latest_orchestrator_state`. Use
        `/v1/byoc/workers` for BYOC worker inventory.
      operationId: listOrchestrators
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/active_only"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrchestratorListResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"

  /v1/net/models:
    get:
      tags: [Network]
      summary: Model availability
      description: |
        Returns one row per (pipeline, model) combination currently offered by at
        least one warm Livepeer AI orchestrator, including warm orchestrator count
        and wei-per-pixel price range. Backed by `naap.api_latest_orchestrator_state`,
        parsing the `raw_capabilities` JSON of each active orchestrator to enumerate
        which (pipeline, model) pairs it advertises.

        This endpoint covers the nine standard Livepeer AI pipelines only:
        text-to-image, image-to-image, image-to-video, upscale, audio-to-text, llm,
        segment-anything-2, image-to-text, and text-to-speech.

        **BYOC models (e.g. `openai-chat-completions`) do NOT appear here.** BYOC
        workers register via `worker_lifecycle` Kafka events and never write to the
        capability heartbeat table that backs this endpoint. To see which BYOC
        capabilities and models are currently available, use `/v1/byoc/workers`.

        `WarmOrchCount` reflects orchestrators seen within the last 15 minutes at
        query time. Prices are in wei per pixel as advertised in the capability
        heartbeat; not all orchestrators set a price, so coverage may be sparse.
      operationId: listModels
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/pipeline"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelAvailability"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"


  # ── Model Performance (R12) ──────────────────────────────────────────────

  /v1/perf/by-model:
    get:
      summary: Streaming performance by AI model
      description: |
        Returns frames-per-second (FPS) performance statistics broken down by
        (model, pipeline) for live streaming sessions. Backed by
        `naap.api_gpu_inventory` joined with `naap.api_fps_hourly`. Each row
        summarises avg, P50, and P99 output FPS across all streaming sessions
        observed in the requested time window for that (model, pipeline) pair.

        This endpoint measures continuous video streaming throughput — it is
        meaningful only for pipelines that produce a continuous video output
        (e.g. streamdiffusion-sdxl-v2v). `WarmOrchCount` is derived from the
        current capability snapshot (not a historical aggregate).

        **BYOC and AI-batch models do NOT appear here, by design.** BYOC and
        AI-batch jobs are discrete request/response API calls with durations in
        the millisecond range. They do not produce continuous video streams, they
        generate no FPS measurements, and they are never written to
        `api_fps_hourly`. To compare AI-batch and BYOC model performance by
        duration (p50/p99 latency), use `/v1/jobs/by-model`, which is the
        dedicated cross-type model performance endpoint.
      operationId: listModelPerformance
      tags: [Network]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/start"
        - $ref: "#/components/parameters/end"
        - $ref: "#/components/parameters/pipeline"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ModelPerformance" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  # ── Capacity (R15) ───────────────────────────────────────────────────────

  /v1/net/capacity:
    get:
      summary: Network capacity vs. demand
      description: |
        Returns a point-in-time snapshot of GPU supply versus active stream demand
        per (pipeline, model). Backed by `naap.canonical_capability_hardware_inventory`
        joined with `naap.canonical_active_stream_state_latest_store`.

        `WarmOrchCount` is the number of orchestrators offering the pipeline/model
        pair as of the most recent capability snapshot. `TotalVRAMBytes` is the
        sum of VRAM across all warm orchestrators for that pair. `ActiveStreams` is
        the count of currently live streaming sessions for the pair.

        **BYOC pipelines do appear in this response** because BYOC workers register
        their capabilities in the same capability snapshot mechanism. However,
        `ActiveStreams` is always 0 for BYOC pipelines because BYOC jobs use a
        discrete request/response model and are never reflected in the active
        stream state table. Do not interpret a non-zero `WarmOrchCount` with zero
        `ActiveStreams` on a BYOC pipeline as underutilisation — these are
        structurally different job types.

        The `SnapshotTime` field indicates when the underlying capability snapshot
        was taken. This endpoint does not accept time-range parameters; it always
        reflects the latest available snapshot.
      operationId: getCapacitySummary
      tags: [Capacity, Network]
      parameters:
        - $ref: "#/components/parameters/org"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CapacitySummary" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  # ── SLA / GPU / Network Demand (ported from leaderboard-serverless) ────────

  /v1/sla/compliance:
    get:
      summary: SLA compliance metrics
      description: |
        Returns per-orchestrator SLA compliance metrics aggregated into hourly
        buckets, grouped by (orchestrator_address, pipeline_id, model_id, gpu_id).
        Backed by `naap.api_sla_compliance_store`. This endpoint covers live
        streaming sessions only — AI-batch and BYOC job SLA is tracked separately
        at `/v1/jobs/sla`.

        The `sla_score` field is the primary composite quality metric: it equals
        `100 × health_signal_coverage_ratio × ((0.7 × reliability_score) + (0.3 ×
        quality_score))`, clamped to [0, 100]. Quality scoring compares the current
        row against the prior 7 full UTC days of network-wide pipeline+model
        benchmarks; the active scoring contract version is reported in
        `sla_semantics_version` (currently `quality-benchmark-v1`).

        `region` is always null — it is not captured in any current event schema.
        `confirmed_swapped_sessions` is always 0 because the confirmation signal
        is absent in the current event schema. Filtering on `region` is accepted
        but has no effect.

        **Window:** default 3h, min 1m, max 30d.
      operationId: listSLACompliance
      tags: [SLA]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/window"
        - $ref: "#/components/parameters/orchestrator_address"
        - $ref: "#/components/parameters/pipeline_id"
        - $ref: "#/components/parameters/model_id"
        - $ref: "#/components/parameters/gpu_id"
        - $ref: "#/components/parameters/region"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SLAComplianceResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/500" }

  /v1/network/demand:
    get:
      summary: Network demand metrics
      description: |
        Returns gateway-level streaming demand aggregated into hourly buckets,
        grouped by (gateway, pipeline_id, model_id). Backed by
        `naap.api_network_demand`. This endpoint covers live streaming sessions
        only — AI-batch and BYOC demand is tracked separately at `/v1/jobs/demand`.

        Each row captures session counts, FPS statistics, stream-minutes, and
        detailed session lifecycle counters (startup success, swaps, errors) for
        one gateway/pipeline/model/hour combination. The `ticket_face_value_eth`
        field is a proportional ETH payment estimate for the gateway's sessions
        in that bucket.

        `region` is always null. This surface unions performance-backed hourly
        keys with session-demand keys so that demand-only rows (sessions with no
        FPS data) and perf-only rows both remain visible in the result set.

        **Window:** default 3h, min 1m, max 30d.
      operationId: listNetworkDemand
      tags: [Demand]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/window"
        - $ref: "#/components/parameters/gateway_filter"
        - $ref: "#/components/parameters/pipeline_id"
        - $ref: "#/components/parameters/model_id"
        - $ref: "#/components/parameters/region"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetworkDemandResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/500" }

  /v1/gpu/network-demand:
    get:
      summary: GPU-sliced network demand metrics
      description: |
        Returns GPU-sliced gateway streaming demand aggregated into hourly buckets,
        grouped by (gateway, orchestrator_address, pipeline_id, model_id, gpu_id).
        Backed by `naap.api_gpu_network_demand`. This is the GPU-attributed view
        of the same streaming session data as `/v1/network/demand` — it adds
        per-GPU granularity at the cost of additional attribution uncertainty.

        Rows where GPU identity could not be resolved carry
        `gpu_identity_status = hardware_unresolved` and a null `gpu_id`. These
        rows remain visible so that unattributed session volume is not silently
        dropped. Rows with a confirmed GPU have `gpu_identity_status = resolved`.

        `region` is always null. This endpoint covers streaming sessions only —
        AI-batch and BYOC jobs do not produce GPU-sliced streaming demand rows.

        **Window:** default 3h, min 1m, max 30d.
      operationId: listGPUNetworkDemand
      tags: [Demand]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/window"
        - $ref: "#/components/parameters/gateway_filter"
        - $ref: "#/components/parameters/orchestrator_address"
        - $ref: "#/components/parameters/pipeline_id"
        - $ref: "#/components/parameters/model_id"
        - $ref: "#/components/parameters/gpu_id"
        - $ref: "#/components/parameters/region"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GPUNetworkDemandResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/500" }

  /v1/gpu/metrics:
    get:
      summary: GPU performance metrics
      description: |
        Returns per-GPU streaming performance metrics aggregated into hourly
        buckets, grouped by (orchestrator_address, pipeline_id, model_id, gpu_id).
        Backed by `naap.api_sla_compliance_store` (the SLA hourly bucket table).
        Hardware dimensions (`gpu_model_name`, `gpu_memory_bytes_total`) are joined
        from the GPU inventory table. This endpoint covers streaming sessions only —
        AI-batch and BYOC jobs are not reflected in these metrics.

        Latency fields use canonical session-edge proxies rather than
        raw producer-reported status latency: `avg_prompt_to_first_frame_ms` is
        derived from `ai_stream_status.start_time` to
        `gateway_receive_few_processed_segments`; `avg_e2e_latency_ms` from
        `gateway_send_first_ingest_segment` to `runner_send_first_processed_segment`.

        **The following fields are always null network-wide and should not be used
        for filtering or analysis:** `region` (not captured in event data),
        `runner_version` (not captured), `cuda_version` (not captured),
        `fps_jitter_coefficient` (not computed). Filter parameters for these fields
        are accepted but have no effect.

        **Window:** default 24h, min 1m, max 72h.
      operationId: listGPUMetrics
      tags: [GPUMetrics]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/window"
        - $ref: "#/components/parameters/orchestrator_address"
        - $ref: "#/components/parameters/pipeline_id"
        - $ref: "#/components/parameters/model_id"
        - $ref: "#/components/parameters/gpu_id"
        - $ref: "#/components/parameters/gpu_model_name"
        - $ref: "#/components/parameters/runner_version"
        - $ref: "#/components/parameters/cuda_version"
        - $ref: "#/components/parameters/region"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GPUMetricsResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/500" }

  # ── Dashboard paths (R16) ─────────────────────────────────────────────────

  /v1/dashboard/kpi:
    get:
      summary: Dashboard KPI metrics
      description: |
        Returns top-level KPI metrics for the dashboard: success rate, active
        orchestrator count, total session count, usage minutes, and hourly
        time-series buckets for sessions and usage. Backed by
        `naap.api_network_demand` (for session and usage metrics) and
        `naap.api_latest_orchestrator_state` (for `orchestratorsOnline`).

        **This endpoint covers streaming sessions only.** AI-batch and BYOC job
        counts are NOT included in any KPI field here. The `dailySessionCount`
        and `dailyUsageMins` metrics reflect live video streaming sessions
        exclusively. For AI-batch and BYOC job overview metrics, use
        `/v1/dashboard/jobs/overview`.

        `dailyNetworkFeesEth` is always 0 — fees are not tracked in the current
        event schema and this field is reserved for future use.

        Deltas are computed by splitting the requested window into two equal halves
        and comparing the earlier half against the later half. A positive delta
        indicates growth from the first half to the second.

        **Window:** default 24h, max 168h (7 days). Accepts `?window=24h` or `?window=7d`.

        **Filters:** `pipeline` narrows session counts and usage minutes; `model_id`
        narrows usage minutes only (session counts are not tracked at model
        granularity in the underlying table).
      operationId: getDashboardKPI
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/window"
        - $ref: "#/components/parameters/pipeline"
        - $ref: "#/components/parameters/model_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardKPI" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/pipelines:
    get:
      summary: Pipeline usage summary
      description: |
        Returns the top N streaming pipelines by session count over the last 24
        hours, suitable for the pipeline usage bar or pie chart widget. Each row
        contains total sessions, total usage minutes, average FPS, and a per-model
        breakdown (`modelMins`).

        **This endpoint covers streaming session pipelines only.** AI-batch and
        BYOC pipelines do not appear here. The data is sourced from
        `naap.api_network_demand` and reflects the last 24 hours regardless of any
        other time filter. For AI-batch pipeline breakdown, use
        `/v1/dashboard/jobs/by-pipeline`. For BYOC capability breakdown, use
        `/v1/dashboard/jobs/by-capability`.

        The `limit` parameter controls how many top pipelines are returned
        (1–20, default 5).
      operationId: getDashboardPipelines
      tags: [Dashboard]
      parameters:
        - name: limit
          in: query
          description: Maximum pipelines to return (1–20, default 5).
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardPipelineUsage" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/orchestrators:
    get:
      summary: Orchestrator SLA table
      description: |
        Returns per-orchestrator SLA metrics aggregated over a rolling window,
        suitable for the orchestrator leaderboard table widget. Each row includes
        session counts, effective success rate, no-swap ratio, pipelines and models
        currently offered, GPU count from the hardware inventory, and the latest
        available hourly contracted `slaScore` within the requested window.

        `slaScore` is taken from the most recent hour bucket within the window that
        has a computed score — it is not a window-wide average. `slaWindowStart`
        indicates which hour bucket produced the score. If no scored bucket falls
        within the window, both fields are null.

        Data is sourced from `naap.api_sla_compliance_store` (for SLA metrics) and
        `naap.api_latest_orchestrator_state` (for pipeline/model/GPU inventory).
        This endpoint covers streaming orchestrators only — BYOC workers do not
        appear here.

        **Window:** default 7d (168h), max 30d (720h).
      operationId: getDashboardOrchestrators
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/window"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardOrchestrator" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/gpu-capacity:
    get:
      summary: GPU capacity inventory
      description: |
        Returns GPU hardware inventory grouped by pipeline, model, and GPU model,
        sourced from the latest capability snapshots (last 10 minutes). Suitable
        for the GPU capacity widget. The response includes total GPU count, active
        GPU count, available capacity fraction, a breakdown by GPU hardware model,
        and a nested breakdown by pipeline and model.

        Data is sourced from `naap.canonical_capability_hardware_inventory`, which
        is populated from orchestrator capability heartbeats. Only orchestrators
        active within the last 10 minutes are included.

        This endpoint does not accept time-range parameters — it always reflects
        the most recent capability snapshot. GPU counts reflect the number of GPU
        slots advertised in capability heartbeats, not necessarily the number of
        physically distinct cards.
      operationId: getDashboardGPUCapacity
      tags: [Dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardGPUCapacity" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/pipeline-catalog:
    get:
      summary: Active pipeline catalog
      description: |
        Returns all (pipeline, model) combinations currently offered by at least
        one warm orchestrator (seen within the last 10 minutes), sourced from
        `naap.api_latest_orchestrator_state`. Suitable for the pipeline catalog
        widget or for populating filter dropdowns.

        **Response format note:** This endpoint returns a plain JSON array — there
        is no `data` wrapper object and no `meta` envelope. The response body is
        directly an array of `DashboardPipelineCatalogEntry` objects.

        The `regions` array in each entry is always empty — region data is not
        captured in the current event schema. This endpoint covers the nine standard
        Livepeer AI pipelines only; BYOC capabilities do not appear here.
      operationId: getDashboardPipelineCatalog
      tags: [Dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardPipelineCatalogEntry" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/pricing:
    get:
      summary: Pipeline pricing (raw wei)
      description: |
        Returns raw wei-per-unit pricing for each (pipeline, model) combination,
        aggregated across all active orchestrators (seen within the last 10 minutes).
        Suitable for the pricing widget. Prices are sourced directly from orchestrator
        capability heartbeats stored in `naap.api_latest_orchestrator_state`.

        `priceAvgWeiPerUnit` is the unweighted mean across orchestrators that
        advertise a price for that (pipeline, model) pair. To convert to a more
        human-readable scale: `price_in_gwei = avg / 1e9`.
        `orchCount` is the number of active orchestrators contributing to the price
        aggregation for that row.

        **Coverage is sparse.** Most orchestrators do not advertise explicit prices
        in their capability heartbeats, so many (pipeline, model) pairs will have
        `orchCount = 0` or will simply not appear in the response.

        **Response format note:** This endpoint returns a plain JSON array — there
        is no `data` wrapper object and no `meta` envelope.
      operationId: getDashboardPricing
      tags: [Dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardPipelinePricing" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/job-feed:
    get:
      summary: Live job feed
      description: |
        Returns currently active streaming sessions ordered by most recently seen,
        each representing one live stream attributed to a gateway/orchestrator pair.
        Sourced from `naap.canonical_active_stream_state_latest_store`. Suitable
        for the live activity feed widget on the dashboard.

        **This endpoint covers streaming sessions only.** AI-batch and BYOC jobs are
        discrete request/response calls that complete in milliseconds and are never
        in a persistent "active" state, so they do not appear in this feed. Sessions
        with no orchestrator attribution yet appear with an empty `orchestratorUrl`
        field — this is normal during the brief period before the orchestrator
        assignment is confirmed.

        `durationSeconds` is the elapsed time since `firstSeen`. `inputFps` and
        `outputFps` are the most recently observed FPS values for the session.

        **Response format note:** This endpoint returns a plain JSON array — there
        is no `data` wrapper object and no `meta` envelope.

        The `limit` parameter controls the maximum number of active sessions returned
        (1–200, default 50).
      operationId: getDashboardJobFeed
      tags: [Dashboard]
      parameters:
        - name: limit
          in: query
          description: Maximum items to return (1–200, default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardJobFeedItem" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/jobs/overview:
    get:
      summary: Jobs overview (AI batch + BYOC)
      description: |
        Returns top-level aggregate statistics for both AI-batch and BYOC jobs in
        the requested time window. Backed by `naap.canonical_ai_batch_jobs` and
        `naap.canonical_byoc_jobs`. The response contains two sub-objects —
        `ai_batch` and `byoc` — each with total job count, selection outcome
        counts (`selected`, `no_orch`, `unknown`), success rate, average
        duration, p99 duration, and selected-only attribution worked rate.

        This endpoint is the dashboard-level entry point for job health monitoring.
        Unlike streaming KPIs (available at `/v1/dashboard/kpi`), this endpoint
        covers only discrete request/response job types. Streaming sessions do not
        contribute to any field here.

        Optional `pipeline` and `model_id` filters scope both sub-aggregates to a
        specific pipeline or model. When filtered, rows that do not match are
        excluded from both counts and rates, so the resulting success rate reflects
        only the filtered subset.
      operationId: getDashboardJobsOverview
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/start"
        - $ref: "#/components/parameters/end"
        - $ref: "#/components/parameters/pipeline"
        - $ref: "#/components/parameters/model_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/DashboardJobsOverview" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/jobs/by-pipeline:
    get:
      summary: AI batch jobs breakdown by pipeline
      description: |
        Returns per-pipeline aggregates (job count, selection outcome counts,
        success rate, average duration, and selected-only attribution worked
        rate) for AI-batch jobs in the requested time window. Backed by
        `naap.canonical_ai_batch_jobs`. Each row represents one fixed Livepeer
        AI pipeline (e.g. `text-to-image`, `llm`, `audio-to-text`).

        **This endpoint covers AI-batch jobs only.** BYOC jobs do not appear here.
        For BYOC capability breakdown, use `/v1/dashboard/jobs/by-capability`. For
        a combined AI-batch + BYOC overview, use `/v1/dashboard/jobs/overview`.

        The optional `pipeline` filter scopes results to a single pipeline. The
        optional `model_id` filter further scopes to a specific model within a
        pipeline, producing a single row (or no rows if the model has no jobs in
        the window).
      operationId: getDashboardJobsByPipeline
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/start"
        - $ref: "#/components/parameters/end"
        - $ref: "#/components/parameters/pipeline"
        - $ref: "#/components/parameters/model_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardJobsByPipelineRow" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  /v1/dashboard/jobs/by-capability:
    get:
      summary: BYOC jobs breakdown by capability
      description: |
        Returns per-capability aggregates (job count, selection outcome counts,
        success rate, average duration, and selected-only attribution worked
        rate) for BYOC jobs in the requested time window. Backed by
        `naap.canonical_byoc_jobs`. Each row represents one dynamic BYOC
        capability string (e.g. `openai-chat-completions`,
        `openai-image-generation`).

        **This endpoint covers BYOC jobs only.** AI-batch jobs do not appear here.
        For AI-batch pipeline breakdown, use `/v1/dashboard/jobs/by-pipeline`. For
        a combined overview, use `/v1/dashboard/jobs/overview`.

        The optional `pipeline` filter (which maps to `capability` in the BYOC
        context) scopes results to a single capability. The optional `model_id`
        filter scopes to a specific model within a capability. Capability names
        are stored and matched verbatim — they are never normalised or hardcoded.
      operationId: getDashboardJobsByCapability
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/org"
        - $ref: "#/components/parameters/start"
        - $ref: "#/components/parameters/end"
        - $ref: "#/components/parameters/pipeline"
        - $ref: "#/components/parameters/model_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DashboardJobsByCapabilityRow" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  # ── AI Batch Jobs (R17) ───────────────────────────────────────────────────

  /v1/ai-batch/summary:
    get:
      summary: AI batch job summary by pipeline
      description: |
        Returns per-pipeline aggregates — total job count, selection outcome
        counts, success rate, average duration, average latency score, and a
        selected-only attribution worked rate — for completed AI-batch jobs in
        the requested time window. Backed by `naap.canonical_ai_batch_jobs`,
        which is populated by the Go attribution resolver processing events from
        the `network_events` Kafka topic.

        Covers the nine fixed Livepeer AI pipelines: text-to-image,
        image-to-image, image-to-video, upscale, audio-to-text, llm,
        segment-anything-2, image-to-text, and text-to-speech. BYOC capabilities
        never appear here. For LLM-specific metrics (tokens/sec, TTFT, total
        tokens), use `/v1/ai-batch/llm/summary`.

        The default time window is the last 24 hours. `avg_latency_score` is the
        mean of the per-job latency score computed by the resolver based on
        orchestrator response time relative to network benchmarks.
        `selected_attribution_worked_rate` uses `selection_outcome = selected`
        as the denominator and treats `resolved + hardware_less + stale` as
        worked attribution.
      operationId: getAIBatchSummary
      tags: [AIBatch]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/start" }
        - { $ref: "#/components/parameters/end" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AIBatchJobSummary" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  /v1/ai-batch/jobs:
    get:
      summary: Paginated AI batch job records
      description: |
        Returns individual completed AI-batch job records ordered by
        `completed_at` descending, with cursor pagination. Backed by
        `naap.canonical_ai_batch_jobs`. Each record represents a single discrete
        AI inference request across any of the nine fixed pipelines.

        Attribution fields populated by the resolver include `gpu_model`
        (the GPU hardware model that served the job, if resolved),
        `selection_outcome` (`selected`, `no_orch`, `unknown`), and
        `attribution_status` (one of: `resolved`, `hardware_less`, `stale`,
        `ambiguous`, `unresolved`). `selection_outcome` is a job-lifecycle field
        independent from attribution status.

        `success` can be null when the outcome was not deterministically recorded
        in the event stream. `tries` reflects the number of orchestrator attempts
        before the job completed or failed. `orch_url` is the URL of the
        orchestrator that ultimately served the job (empty if unattributed).

        Cursor pagination uses base64-encoded JSON position markers. Pass the
        `next_cursor` from the previous response as `?cursor=` on the next request.
      operationId: listAIBatchJobs
      tags: [AIBatch]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/start" }
        - { $ref: "#/components/parameters/end" }
        - { $ref: "#/components/parameters/limit" }
        - { $ref: "#/components/parameters/cursor" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AIBatchJobRecord" }
                  pagination: { $ref: "#/components/schemas/CursorPagination" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "400": { $ref: "#/components/responses/400" }
        "500": { $ref: "#/components/responses/500" }

  /v1/ai-batch/llm/summary:
    get:
      summary: LLM performance summary by model
      description: |
        Returns per-model LLM-specific performance metrics for the `llm` AI-batch
        pipeline only. Backed by `naap.canonical_ai_batch_jobs` joined with
        `naap.stg_ai_llm_requests`, which contains token-level telemetry emitted
        by LLM inference workers.

        Metrics include: total request count, success rate, average tokens per
        second (`avg_tokens_per_sec`), average time to first token in milliseconds
        (`avg_ttft_ms`), and average total tokens per request (`avg_total_tokens`).

        **This endpoint is exclusive to the `llm` pipeline.** All other AI-batch
        pipelines (text-to-image, audio-to-text, etc.) produce no LLM records and
        will return an empty result set if targeted via filtering. Token and TTFT
        data is only available for jobs where the LLM worker emitted the
        corresponding telemetry events; jobs with missing telemetry contribute to
        request counts but not to token or latency averages.
      operationId: getAIBatchLLMSummary
      tags: [AIBatch]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/start" }
        - { $ref: "#/components/parameters/end" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AIBatchLLMSummary" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  # ── BYOC Jobs (R18) ───────────────────────────────────────────────────────

  /v1/byoc/summary:
    get:
      summary: BYOC job summary by capability
      description: |
        Returns per-capability aggregates — total job count, selection outcome
        counts, success rate, average duration, and a selected-only attribution
        worked rate — for completed BYOC jobs in the requested time window.
        Backed by `naap.canonical_byoc_jobs`, which is populated by the Go
        attribution resolver processing `network_events` Kafka events.

        Capability values are stored and returned verbatim as broadcast by BYOC
        workers (e.g. `openai-chat-completions`, `openai-image-generation`,
        `openai-text-embeddings`). The set of capabilities is fully dynamic and
        never hardcoded in the API — new capabilities appear automatically as BYOC
        workers register them. Fixed AI-batch pipelines never appear in this
        endpoint; use `/v1/ai-batch/summary` for those.

        The default time window is the last 24 hours.
        Under the current raw BYOC contract, `no_orch_jobs` is usually zero
        because blank-identity failures generally remain `unknown` until explicit
        pre-selection failure evidence exists.
      operationId: getBYOCSummary
      tags: [BYOC]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/start" }
        - { $ref: "#/components/parameters/end" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BYOCJobSummary" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  /v1/byoc/jobs:
    get:
      summary: Paginated BYOC job records
      description: |
        Returns individual completed BYOC job records ordered by `completed_at`
        descending, with cursor pagination. Backed by `naap.canonical_byoc_jobs`.
        Each record represents a single discrete BYOC request for a dynamic
        capability.

        `capability` is the verbatim capability string as registered by the BYOC
        worker. `orch_address` is the orchestrator service URL for BYOC jobs (e.g.
        `https://livepeer-ai.xodeapp.xyz:18935`), not an Ethereum address —
        BYOC jobs are identified by URL rather than on-chain address. `worker_url`
        is the URL of the specific BYOC worker that handled the request; it is
        often empty because not all workers report it in the event payload.

        Attribution fields (`gpu_model`, `selection_outcome`,
        `attribution_status`) follow the same resolver-written schema as
        AI-batch jobs. `http_status` reflects the HTTP response code returned by
        the BYOC worker for the inference request.

        Cursor pagination uses base64-encoded JSON position markers.
      operationId: listBYOCJobs
      tags: [BYOC]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/start" }
        - { $ref: "#/components/parameters/end" }
        - { $ref: "#/components/parameters/limit" }
        - { $ref: "#/components/parameters/cursor" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BYOCJobRecord" }
                  pagination: { $ref: "#/components/schemas/CursorPagination" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "400": { $ref: "#/components/responses/400" }
        "500": { $ref: "#/components/responses/500" }

  /v1/byoc/workers:
    get:
      summary: BYOC worker inventory by capability
      description: |
        Returns per-capability BYOC worker registrations, including worker count,
        the list of model IDs each capability serves, and average price per unit.
        Backed by `naap.canonical_byoc_workers`, which is populated from
        `worker_lifecycle` Kafka events emitted when BYOC workers start up or
        heartbeat their registration.

        **This is the canonical source for BYOC model availability.** Because BYOC
        workers do not use the Livepeer capability heartbeat protocol, they never
        appear in `/v1/net/models` or `/v1/net/orchestrators`. This endpoint is
        the only place in the API where BYOC model names (e.g.
        `Qwen/Qwen2.5-14B-Instruct-AWQ`) are directly enumerated per capability.

        `worker_count` is the number of distinct workers that registered the
        capability within the requested time window. `models` is the union of
        all model IDs reported by workers for that capability during the window.
        `avg_price_per_unit` is the mean price across registrations that included
        pricing information.
      operationId: getBYOCWorkers
      tags: [BYOC]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/start" }
        - { $ref: "#/components/parameters/end" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BYOCWorkerSummary" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  /v1/byoc/auth:
    get:
      summary: BYOC auth event summary by capability
      description: |
        Returns per-capability authentication event counts, success rates, and
        failure counts from `job_auth` events in the requested time window. Backed
        by `naap.canonical_byoc_auth`. Auth events are emitted when a gateway
        attempts to authenticate a BYOC request with an orchestrator before
        dispatching it to the worker.

        `total_events` is the count of all auth events (successes + failures) for
        the capability. `success_rate` is the fraction of auth events that resulted
        in a successful authentication (0.0–1.0). `failure_count` is the raw count
        of failed auth events. A high failure rate may indicate credential issues,
        misconfigured workers, or gateway/orchestrator version mismatches.

        Capability names are stored verbatim. The default time window is the last
        24 hours.
      operationId: getBYOCAuthSummary
      tags: [BYOC]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/start" }
        - { $ref: "#/components/parameters/end" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BYOCAuthSummary" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "500": { $ref: "#/components/responses/500" }

  # ── Jobs — request/response job types (R19) ──────────────────────────────

  /v1/jobs/demand:
    get:
      summary: Hourly demand for request/response jobs
      description: |
        Returns hourly demand metrics — job counts, success counts, success rate,
        average duration, and total minutes — for AI-batch and BYOC jobs grouped
        by (window_start, org, gateway, pipeline_id, model_id, job_type). Backed
        by `naap.api_unified_demand`. The `job_type` field distinguishes `ai-batch`
        from `byoc` rows within the same response.

        **This endpoint covers AI-batch and BYOC jobs only — not streaming
        sessions.** Streaming demand is available at `/v1/network/demand`.

        For BYOC rows, `pipeline_id` holds the dynamic capability name (e.g.
        `openai-chat-completions`) and `model_id` holds the worker-resolved model
        identifier (e.g. `Qwen/Qwen2.5-14B-Instruct-AWQ`). For AI-batch rows,
        `pipeline_id` holds the fixed pipeline name (e.g. `text-to-image`).

        Use `?job_type=ai-batch` or `?job_type=byoc` to filter to a single type.
        Omit `job_type` to receive both types interleaved and differentiated by
        the `job_type` field.

        **Window:** default 24h. Cursor-paginated.
      operationId: listJobsDemand
      tags: [Jobs]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/window" }
        - { $ref: "#/components/parameters/limit" }
        - { $ref: "#/components/parameters/cursor" }
        - name: pipeline_id
          in: query
          description: Filter by pipeline name (for ai-batch) or capability name (for byoc).
          schema: { type: string }
        - name: model_id
          in: query
          description: Filter by model identifier.
          schema: { type: string }
        - name: gateway
          in: query
          description: Filter by gateway Ethereum address.
          schema: { type: string }
        - name: job_type
          in: query
          description: Filter to one job type. One of "ai-batch" or "byoc".
          schema:
            type: string
            enum: [ai-batch, byoc]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/JobsDemandRow" }
                  pagination: { $ref: "#/components/schemas/CursorPagination" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "400": { $ref: "#/components/responses/400" }
        "500": { $ref: "#/components/responses/500" }

  /v1/jobs/sla:
    get:
      summary: SLA compliance for request/response jobs
      description: |
        Returns hourly per-orchestrator SLA metrics — job counts, success rates,
        and SLA scores — for AI-batch and BYOC jobs grouped by
        (window_start, org, orchestrator_uri, pipeline_id, model_id, gpu_id,
        job_type). Backed by `naap.api_unified_sla`. The `job_type` field
        distinguishes `ai-batch` from `byoc` rows.

        **This endpoint covers AI-batch and BYOC jobs only.** Streaming session
        SLA is tracked separately at `/v1/sla/compliance`.

        `orchestrator_uri` is always a service URI, not an on-chain address.
        BYOC jobs are identified by orchestrator URL rather than Ethereum
        address because BYOC orchestrators are not required to be registered
        on-chain. Do not attempt to look up BYOC URIs in `/v1/net/orchestrators`.

        `sla_score` is nullable — it may be null for rows where the scoring model
        could not produce a score (e.g. insufficient data in the window).

        **Window:** default 24h. Cursor-paginated.
      operationId: listJobsSLA
      tags: [Jobs]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/window" }
        - { $ref: "#/components/parameters/limit" }
        - { $ref: "#/components/parameters/cursor" }
        - name: pipeline_id
          in: query
          description: Filter by pipeline name (for ai-batch) or capability name (for byoc).
          schema: { type: string }
        - name: model_id
          in: query
          description: Filter by model identifier.
          schema: { type: string }
        - $ref: "#/components/parameters/orchestrator_uri"
        - name: job_type
          in: query
          description: Filter to one job type. One of "ai-batch" or "byoc".
          schema:
            type: string
            enum: [ai-batch, byoc]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/JobsSLARow" }
                  pagination: { $ref: "#/components/schemas/CursorPagination" }
                  meta: { $ref: "#/components/schemas/ResponseMeta" }
        "400": { $ref: "#/components/responses/400" }
        "500": { $ref: "#/components/responses/500" }

  /v1/jobs/by-model:
    get:
      summary: Request/response job performance by model
      description: |
        Returns p50/p99 duration, average duration, job count, and warm orchestrator
        count per (pipeline, model, job_type) for AI-batch and BYOC jobs. Backed by
        `naap.canonical_ai_batch_jobs` and `naap.canonical_byoc_jobs`. The
        `job_type` field distinguishes `ai-batch` from `byoc` rows.

        **This is the only endpoint in the entire API that shows both AI-batch and
        BYOC model performance side by side in a single response.** Use it to
        compare inference latency across models regardless of whether they are
        served by fixed Livepeer AI pipelines or dynamic BYOC capabilities.

        For AI-batch rows, `pipeline` is the fixed pipeline name (e.g.
        `text-to-image`). For BYOC rows, `pipeline` holds the capability name
        (e.g. `openai-chat-completions`). `warm_orch_count` is derived from the
        current capability snapshot at query time — it reflects live availability,
        not a historical count from the requested window.

        `avg_duration_ms`, `p50_duration_ms`, and `p99_duration_ms` are nullable —
        they are null when no completed jobs with duration data exist for that
        (pipeline, model, job_type) combination in the window.

        For streaming FPS performance (not duration), use `/v1/perf/by-model`.

        **Window:** default 24h.
      operationId: listJobsByModel
      tags: [Jobs]
      parameters:
        - { $ref: "#/components/parameters/org" }
        - { $ref: "#/components/parameters/window" }
        - name: pipeline_id
          in: query
          description: Filter by pipeline name (for ai-batch) or capability name (for byoc).
          schema: { type: string }
        - name: model_id
          in: query
          description: Filter by model identifier.
          schema: { type: string }
        - name: job_type
          in: query
          description: Filter to one job type. One of "ai-batch" or "byoc".
          schema:
            type: string
            enum: [ai-batch, byoc]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/JobModelPerformance" }
        "500": { $ref: "#/components/responses/500" }
