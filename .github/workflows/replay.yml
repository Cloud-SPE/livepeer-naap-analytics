# Replay-harness determinism gate. Runs the daily fixture through all
# four layers (raw → normalized → canonical → api) and fails if the
# checksum rollups drift between two runs over the same fixture.
#
# Gated on the REPLAY_FIXTURE_S3_BUCKET repo variable — forks / setup
# without the fixture bucket skip the job (no cryptic failures).
#
# Required repo configuration:
#   vars:
#     REPLAY_FIXTURE_S3_BUCKET  – bucket name (no s3:// prefix)
#   secrets:
#     AWS_ACCESS_KEY_ID
#     AWS_SECRET_ACCESS_KEY
#
# Bucket layout (see scripts/upload-fixture-to-s3.sh):
#   s3://<bucket>/replay/fixtures/<archive_sha256>.ndjson.zst
#
# The committed manifest links the branch to the bytes in the bucket
# via archive_sha256. Uploading a new fixture is a 3-step process
# documented in scripts/upload-fixture-to-s3.sh.

name: replay-harness

on:
  pull_request:
    branches: [main, refactor/medallion-v2]
  schedule:
    # Nightly 06:00 UTC — catches drift from main / upstream changes.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  daily-replay-verify:
    # Skip gracefully when the fixture bucket isn't configured.
    if: vars.REPLAY_FIXTURE_S3_BUCKET != ''
    runs-on: ubuntu-latest
    env:
      REPLAY_FIXTURE_S3_BUCKET: ${{ vars.REPLAY_FIXTURE_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'us-east-1' }}
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        env:
          CLICKHOUSE_DB: naap
          CLICKHOUSE_USER: naap_admin
          CLICKHOUSE_PASSWORD: changeme
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: api/go.sum

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-clickhouse

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      # The fixture is keyed by its sha, so the same cache key
      # survives across branches that haven't changed the manifest.
      - name: Cache fixture archive
        uses: actions/cache@v4
        with:
          path: tests/fixtures/raw_events_daily.ndjson.zst
          key: replay-fixture-daily-${{ hashFiles('tests/fixtures/raw_events_daily.manifest.json') }}

      - name: Fetch fixture from S3 (if cache miss)
        run: |
          if [[ ! -f tests/fixtures/raw_events_daily.ndjson.zst ]]; then
            bash scripts/fetch-daily-fixture.sh --source s3
          else
            echo "using cached fixture archive"
          fi

      # Bootstrap the naap database + schema into the ephemeral CH.
      # The resolver + dbt both need every canonical/normalized/api
      # table to exist at their expected shape before the replay can
      # populate or read them.
      - name: Apply bootstrap schema
        run: |
          until wget -qO- http://localhost:8123/ping >/dev/null 2>&1; do sleep 1; done
          echo 'CREATE DATABASE IF NOT EXISTS naap' | \
            curl -sS -u 'naap_admin:changeme' 'http://localhost:8123/' --data-binary @-
          cat infra/clickhouse/bootstrap/v1.sql | \
            curl -sS -u 'naap_admin:changeme' 'http://localhost:8123/?database=naap' --data-binary @-

      # Fresh replay CI still applies the checked-in store DDL after
      # bootstrap. dbt only publishes views over resolver-owned _store
      # tables; it does not create those physical tables. This catches
      # bootstrap omissions early and keeps replay aligned with the
      # repo's canonical store declarations.
      - name: Apply store-table DDL
        run: |
          CLICKHOUSE_HTTP_URL=http://localhost:8123 \
          CLICKHOUSE_ADMIN_USER=naap_admin \
          CLICKHOUSE_ADMIN_PASSWORD=changeme \
          CLICKHOUSE_DATABASE=naap \
          bash scripts/apply-store-ddl.sh

      # No Kafka producer on ephemeral CI, so --pause-ingestion=false
      # is safe and slightly faster than the default pause/resume.
      - name: Run replay determinism gate
        env:
          CLICKHOUSE_ADDR: localhost:9000
          CLICKHOUSE_HTTP_ADDR: localhost:8123
          CLICKHOUSE_DB: naap
          CLICKHOUSE_ADMIN_USER: naap_admin
          CLICKHOUSE_ADMIN_PASSWORD: changeme
          DBT_PROFILES_DIR: ${{ github.workspace }}/warehouse
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "8123"
          CLICKHOUSE_USER: naap_admin
          CLICKHOUSE_PASSWORD: changeme
        run: |
          # Build the replay binary once; the Makefile target runs it
          # twice and diffs.
          cd api && go build -o ../bin/replay ./cmd/replay
          cd ..
          ./bin/replay \
            --fixture tests/fixtures/raw_events_daily.ndjson.zst \
            --manifest tests/fixtures/raw_events_daily.manifest.json \
            --layers raw,normalized,canonical,api \
            --output target/replay \
            --pause-ingestion=false
          mv target/replay/latest.json target/replay/first.json
          ./bin/replay \
            --fixture tests/fixtures/raw_events_daily.ndjson.zst \
            --manifest tests/fixtures/raw_events_daily.manifest.json \
            --layers raw,normalized,canonical,api \
            --output target/replay \
            --skip-load \
            --skip-resolver \
            --skip-dbt \
            --pause-ingestion=false \
            --compare-to target/replay/first.json

      # Run the additive-primitives test now that canonical + api
      # state is loaded. Excluded from the fast lint workflow because
      # it requires real data.
      - name: dbt lint — additive primitives
        if: success()
        working-directory: warehouse
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/warehouse
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "8123"
          CLICKHOUSE_DB: naap
          CLICKHOUSE_USER: naap_admin
          CLICKHOUSE_PASSWORD: changeme
        run: dbt test --select test_api_hourly_additive_primitives

      - name: Upload replay reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replay-reports
          path: target/replay/
          retention-days: 7
